<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>On Court Badminton — ระบบจัดการสต๊อก</title>
<style>
:root{
  --navy-dark:#0e1730;
  --navy:#16213e;
  --green-dark:#3c6e22;
  --green:#5c9c2e;
  --green-light:#7ebd45;
  --accent:#7ebd45;
  --bg:#f4f6f4;
  --card:#ffffff;
  --text:#16213e;
  --muted:#68707e;
  --border:#e2e5ea;
  --danger:#b83227;
  --warn:#c9790f;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Thai",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,var(--navy-dark) 0%,var(--navy) 55%,#5c2020 100%);padding:20px;}
.login-box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;}
.login-logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(160deg,var(--green-light),var(--green-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.login-box h2{margin:0 0 4px;}
.login-box .field{text-align:left;}
.login-box input{width:100%;}
.login-error{background:#fdeceb;color:var(--danger);padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;text-align:left;}
.login-hint{margin-top:16px;font-size:12px;color:var(--muted);line-height:1.5;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;margin:0 auto;animation:oc-spin .8s linear infinite;}
@keyframes oc-spin{to{transform:rotate(360deg);}}

/* ---------- layout ---------- */
header{background:var(--navy);color:#fff;padding:0 24px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.15);border-bottom:3px solid var(--danger);}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;}
.brand .logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(160deg,var(--green-light),var(--green-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#aab4d4;flex-wrap:wrap;}
.role-badge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.header-right button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
.header-right button:hover{background:rgba(255,255,255,.1);}
nav{display:flex;gap:4px;overflow-x:auto;}
nav button{background:transparent;border:none;color:#aab4d4;padding:10px 16px;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;font-weight:500;white-space:nowrap;flex-shrink:0;}
nav button:hover{color:#fff;}
nav button.active{color:#fff;border-bottom:3px solid var(--accent);font-weight:700;}
main{max-width:1360px;margin:0 auto;padding:22px 24px 60px;}
h1,h2,h3{margin:0 0 4px;}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
.btn{border:none;padding:9px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:var(--green-light);}
.btn-outline{background:#fff;color:var(--green);border:1px solid var(--green);}
.btn-outline:hover{background:#eafaf1;}
.btn-danger{background:#fff;color:var(--danger);border:1px solid var(--danger);}
.btn-danger:hover{background:#fdeceb;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
input[type=text],input[type=number],input[type=tel],input[type=email],input[type=password],input[type=date],select,textarea{
  border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;background:#fff;color:var(--text);font-family:inherit;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green-light);outline-offset:0;border-color:var(--green-light);}
label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
.field{margin-bottom:12px;}
.chip{border:1px solid var(--border);background:#fff;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:600;}
.chip.active{background:var(--green);color:#fff;border-color:var(--green);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.stat-card .label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.stat-card .value{font-size:26px;font-weight:800;margin-top:6px;}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-card.alert .value{color:var(--warn);}
.dash-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
.table-wrap{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;font-size:13.5px;}
.table th{text-align:left;padding:10px 12px;background:#f0f5f2;color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);white-space:nowrap;}
.table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.table tr:hover td{background:#f8faf9;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.badge-ok{background:#e4f7eb;color:var(--green);}
.badge-low{background:#fff2df;color:var(--warn);}
.badge-out{background:#fdeceb;color:var(--danger);}
.badge-pending{background:#eaf0fb;color:#3457c9;}
.badge-received{background:#e4f7eb;color:var(--green);}
.badge-owner{background:#e8ebf5;color:var(--navy);}
.badge-staff{background:#eaf0fb;color:#3457c9;}
.row-actions{display:flex;gap:6px;flex-wrap:wrap;}
.sell-grid{display:grid;grid-template-columns:1fr 380px;gap:20px;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px;}
.product-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;background:#fff;transition:.12s;}
.product-card:hover{border-color:var(--green-light);box-shadow:0 3px 10px rgba(0,0,0,.07);}
.product-card.disabled{opacity:.4;cursor:not-allowed;}
.product-card .pname{font-weight:700;font-size:13.5px;margin-bottom:4px;min-height:34px;}
.product-card .pprice{color:var(--green);font-weight:800;font-size:15px;}
.product-card .pstock{font-size:11px;color:var(--muted);margin-top:4px;}
.cart-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:sticky;top:132px;max-height:calc(100vh - 150px);display:flex;flex-direction:column;}
.cart-items{flex:1;overflow-y:auto;max-height:320px;margin:12px 0;}
.cart-line{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px;}
.cart-line .cn{font-size:13px;font-weight:600;flex:1;}
.cart-line .cp{font-size:12px;color:var(--muted);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-ctrl button{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:#f4f7f5;cursor:pointer;font-weight:700;}
.cart-total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
.cart-total-row.grand{font-size:18px;font-weight:800;border-top:1px solid var(--border);margin-top:6px;padding-top:10px;}
.pay-methods{display:flex;gap:8px;margin:10px 0;}
.pay-methods button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12.5px;font-weight:600;}
.pay-methods button.active{background:var(--green);color:#fff;border-color:var(--green);}
.empty-state{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px;}
.modal-overlay{position:fixed;inset:0;background:rgba(15,30,22,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#fff;border-radius:12px;padding:22px 24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-box h3{margin-bottom:14px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
.po-line-row{display:grid;grid-template-columns:2fr 70px 90px 30px;gap:8px;align-items:end;margin-bottom:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-dark);color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.error{background:var(--danger);}
.toast.show{opacity:1;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sparkline-wrap{margin-top:10px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px;}
.bar-row .bname{width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:#eef3f0;border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{background:var(--green);height:100%;border-radius:6px;}
.bar-val{width:70px;text-align:right;font-weight:700;flex-shrink:0;}
.link-btn{background:none;border:none;color:var(--green);font-weight:700;cursor:pointer;padding:0;font-size:13px;}
.muted{color:var(--muted);}
.section-title{font-size:14px;font-weight:800;margin-bottom:10px;}
.search-input{min-width:220px;}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted);}

@media(max-width:980px){
  .dash-grid{grid-template-columns:1fr;}
  .sell-grid{grid-template-columns:1fr;}
  .cart-panel{position:static;max-height:none;}
}
@media(max-width:600px){
  main{padding:14px 12px 50px;}
  header{padding:0 12px;}
  .two-col{grid-template-columns:1fr;}
  .po-line-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .modal-box{padding:18px;}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 3v8" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/><path d="M6.2 6.2a8 8 0 1 0 11.6 0" stroke="#fff" stroke-width="2.6" stroke-linecap="round" fill="none"/></svg></div>
    <h2>On Court Badminton</h2>
    <div class="muted" style="margin-bottom:18px;">เข้าสู่ระบบจัดการสต๊อก</div>
    <div id="loginLoading" style="display:none;padding:16px 0 6px;text-align:center;">
      <div class="spinner"></div>
      <div class="muted" style="margin-top:12px;font-size:13px;">กำลังโหลดข้อมูล...</div>
    </div>
    <div id="loginFormFields">
      <div class="login-error" id="loginError" style="display:none;"></div>
      <div class="field"><label>ชื่อผู้ใช้</label><input type="text" id="loginUser" autocomplete="username"></div>
      <div class="field"><label>รหัสผ่าน</label><input type="password" id="loginPass" autocomplete="current-password"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="login-hint" id="loginHint"></div>
    </div>
  </div>
</div>

<div id="appRoot" style="display:none;">
  <header>
    <div class="header-top">
      <div class="brand"><div class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v8" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/><path d="M6.2 6.2a8 8 0 1 0 11.6 0" stroke="#fff" stroke-width="2.8" stroke-linecap="round" fill="none"/></svg></div> On Court Badminton <span style="font-weight:400;font-size:13px;color:#9aa8c9;">— เชียงใหม่</span></div>
      <div class="header-right">
        <span id="meLabel"></span>
        <button onclick="doLogout()">ออกจากระบบ</button>
      </div>
    </div>
    <nav id="navBar"></nav>
  </header>
  <main id="view"></main>
</div>

<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ONCOURT BADMINTON — ระบบจัดการสต๊อก (Postgres edition — Supabase + Railway)
   หน้านี้กับ API เสิร์ฟจากเซิร์ฟเวอร์เดียวกัน (same-origin) ไม่มีปัญหา CORS เลย
========================================================= */

// หมวดหมู่ไม่ได้ล็อกตายตัวอีกต่อไป — อ่านจากข้อมูลสินค้าจริงในชีตเสมอ
// (รองรับกรณีผู้ใช้ตั้งชื่อหมวดหมู่เองในสเปรดชีต เช่น Fee, Drink, Snacks, Shoes Rental ฯลฯ)
const CATEGORY_LABELS = {'Drinks':'เครื่องดื่ม','Drink':'เครื่องดื่ม','Equipment':'อุปกรณ์กีฬา','Shoe Rental':'เช่ารองเท้า','Shoes Rental':'เช่ารองเท้า','Snacks':'ขนม','Fee':'ค่าบริการ'};
function catLabel(c){ return CATEGORY_LABELS[c] || c; }
function getCategories(){
  const set = new Set(data.products.map(p=>p.category).filter(Boolean));
  return Array.from(set).sort();
}

const TABS = [
  {id:'dashboard', label:'แดชบอร์ด'},
  {id:'sell', label:'ขายสินค้า'},
  {id:'inventory', label:'คลังสินค้า'},
  {id:'stockcount', label:'นับสต๊อก'},
  {id:'po', label:'ใบสั่งซื้อ'},
  {id:'members', label:'สมาชิก'},
];

let token = localStorage.getItem('oncourt_token') || null;
let me = null;
let data = { products:[], members:[], sales:[], purchaseOrders:[], stockLog:[], employees:[], settings:{} };

let state = {
  tab: 'dashboard',
  cart: [],
  cartMember: '',
  cartPayment: 'Cash',
  cartProofBase64: null,
  cartProofMime: null,
  cartProofPreview: null,
  receiveDraft: null,
  stockCountInputs: {},
  stockCountResults: null,
  stockCountCategory: 'All',
  stockCountSearch: '',
  reportView: 'sales',
  reportDate: new Date().toLocaleDateString('en-CA'),
  reportValueCategory: 'All',
  sellCategory: 'All',
  sellSearch: '',
  invCategory: 'All',
  invSearch: '',
  memberSearch: '',
  poDraft: null,
};

// ---------- utilities ----------
function money(n){ return '฿' + Math.round(n).toLocaleString('en-US'); }
function fmtDate(d){ const dt = new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d){ const dt = new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ', ' + dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function isSameDay(a,b){ const x=new Date(a), y=new Date(b); return x.toDateString()===y.toDateString(); }
function localDateStr(d){ return new Date(d).toLocaleDateString('en-CA'); } // YYYY-MM-DD ตามเวลาท้องถิ่นของเบราว์เซอร์

// ราคาที่บันทึกไว้ถือเป็นราคารวม VAT อยู่แล้ว (แบบทั่วไปของร้านค้าปลีกไทย) เลยหารกลับเพื่อแยกยอด ex VAT ออกมา
// อัตรา VAT ปรับได้ที่หน้า "ตั้งค่า" (ค่าเริ่มต้น 7%)
// รายการที่อยู่หมวดหมู่ "Fee" (เช่น ค่าเช่าคอร์ท) ไม่มีต้นทุนสินค้า เลยแยกออกจากยอดขายสินค้าตอนคิดกำไร
function getVatRate(){ const v = parseFloat(data.settings && data.settings.vat_rate); return isNaN(v) ? 0.07 : v; }
function isFeeCategory(category){ return !!category && category.toLowerCase()==='fee'; }
function saleBreakdown(sale){
  const VAT_RATE = getVatRate();
  let feeTotal = 0, productTotal = 0, productCost = 0;
  sale.items.forEach(it=>{
    const p = getProduct(it.productId);
    const lineTotal = it.qty * it.price;
    if(p && isFeeCategory(p.category)){ feeTotal += lineTotal; }
    else{ productTotal += lineTotal; productCost += it.qty * (p ? p.cost : 0); }
  });
  const grossTotal = sale.total;
  const exVat = grossTotal / (1 + VAT_RATE);
  const vat = grossTotal - exVat;
  const feeExVat = feeTotal / (1 + VAT_RATE);
  const productExVat = productTotal / (1 + VAT_RATE);
  const profit = productExVat - productCost;
  return {grossTotal, exVat, vat, feeExVat, productExVat, productCost, profit};
}
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getProduct(id){ return data.products.find(p=>p.id===id); }
function getMember(id){ return data.members.find(m=>m.id===id); }

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ t.className = 'toast' + (isError ? ' error' : ''); }, 2600);
}

// ---------- API (same-origin Express server — plain fetch, no CORS/JSONP needed) ----------
async function apiCall(action, payload){
  let res;
  try{
    res = await fetch('/api/action', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action, token, payload: payload||{}})
    });
  }catch(networkErr){
    throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ตรวจสอบอินเทอร์เน็ตแล้วลองใหม่');
  }
  let json = null;
  try{ json = await res.json(); }catch(e){}
  if(!json){ throw new Error('เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง'); }
  if(json.error){
    if(json.status===401){ doLogout(true); }
    throw new Error(json.error);
  }
  return json.data;
}

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if(!username && !password && token){
    // ยังมี token เดิมอยู่ (แค่โหลดข้อมูลไม่สำเร็จตอนเปิดหน้า) — ลองโหลดใหม่แทนที่จะบังคับกรอกรหัสผ่านซ้ำ
    tryAutoLogin();
    return;
  }
  if(!username || !password){ errEl.textContent = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; errEl.style.display='block'; return; }
  showLoginLoadingUI();
  try{
    const res = await apiCall('login', {username, password});
    token = res.token;
    localStorage.setItem('oncourt_token', token);
    await bootstrap();
  }catch(e){
    showLoginForm();
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
function doLogout(silent){
  token = null; me = null;
  localStorage.removeItem('oncourt_token');
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  showLoginForm();
  const passEl = document.getElementById('loginPass'); if(passEl) passEl.value = '';
  if(!silent){
    const userEl = document.getElementById('loginUser'); if(userEl) userEl.value = '';
  }
}
function showLoginLoadingUI(){
  document.getElementById('loginLoading').style.display = 'block';
  document.getElementById('loginFormFields').style.display = 'none';
}
function showLoginForm(){
  document.getElementById('loginLoading').style.display = 'none';
  document.getElementById('loginFormFields').style.display = 'block';
}

async function bootstrap(){
  const res = await apiCall('bootstrap', {});
  data.products = res.products || [];
  data.members = res.members || [];
  data.sales = res.sales || [];
  data.purchaseOrders = res.purchaseOrders || [];
  data.stockLog = res.stockLog || [];
  data.employees = res.employees || [];
  data.settings = res.settings || {};
  me = res.me;
  document.getElementById('loginScreen').style.display = 'none';

  render();
}

function tryAutoLogin(){
  if(!token) return;
  showLoginLoadingUI();

  bootstrap().catch((e)=>{

function renderDashboard(){
  const now = new Date();
  const todaySales = data.sales.filter(s=>isSameDay(s.date, now));
  const todayTotal = todaySales.reduce((s,x)=>s+x.total,0);
  const monthSales = data.sales.filter(s=>{ const d=new Date(s.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  const monthTotal = monthSales.reduce((s,x)=>s+x.total,0);
  const lowStock = data.products.filter(p=>p.stock<=p.lowStockThreshold && p.stock>0);
  const outStock = data.products.filter(p=>p.stock<=0);
  const avgTicket = data.sales.length ? (data.sales.reduce((s,x)=>s+x.total,0)/data.sales.length) : 0;

  const days = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const total = data.sales.filter(s=>isSameDay(s.date,d)).reduce((s,x)=>s+x.total,0);
    days.push({d, total});
  }
  const maxDay = Math.max(1, ...days.map(x=>x.total));
  const points = days.map((x,i)=> `${(i/(days.length-1))*300},${60 - (x.total/maxDay)*55}`).join(' ');

    .filter(x=>x.product).sort((a,b)=>b.qty-a.qty).slice(0,5);

      <div class="stat-card"><div class="label">สมาชิก</div><div class="value">${data.members.length}</div><div class="sub">เฉลี่ยต่อบิล ${money(avgTicket)}</div></div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="section-title">ยอดขาย 14 วันล่าสุด</div>
        <div class="sparkline-wrap">
          <svg viewBox="0 0 300 60" width="100%" height="90" preserveAspectRatio="none">
            <polyline points="${points}" fill="none" stroke="#5c9c2e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px;">
          <span>${fmtDate(days[0].d)}</span><span>${fmtDate(days[days.length-1].d)}</span>
        </div>

        <div class="section-title" style="margin-top:22px;">รายการขายล่าสุด</div>
        <div class="table-wrap">
        <table class="table">
          <thead><tr><th>เวลา</th><th>สินค้า</th><th>สมาชิก</th><th>ผู้ขาย</th><th>ยอดรวม</th><th>สลิป</th></tr></thead>
          <tbody>
            ${recentSales.length ? recentSales.map(s=>`
              <tr>
                <td>${fmtDateTime(s.date)}</td>
                <td>${s.items.map(it=>escapeHtml(it.name)+' ×'+it.qty).join(', ')}</td>
                <td>${s.memberId ? escapeHtml(getMember(s.memberId)?.name || '—') : '<span class="muted">ลูกค้าทั่วไป</span>'}</td>
                <td class="muted">${escapeHtml(s.soldBy||'—')}</td>
                <td>${money(s.total)}</td>
                <td>${s.proofUrl ? `<a href="${escapeHtml(s.proofUrl)}" target="_blank" rel="noopener" class="link-btn">ดูสลิป</a>` : (s.payment==='QR' ? '<span class="muted">—</span>' : '')}</td>
              </tr>`).join('') : '<tr><td colspan="6" class="empty-state">ยังไม่มีรายการขาย</td></tr>'}
          </tbody>
        </table>
        </div>
      </div>

        ${topProducts.length ? topProducts.map(x=>`

function setSellCategory(c){ state.sellCategory=c; render(); }
function setSellSearch(v){ state.sellSearch=v; render(); }
function setPayment(pm){ state.cartPayment=pm; render(); }
function addToCart(pid){
  const p = getProduct(pid);
  const line = state.cart.find(l=>l.productId===pid);
  const currentQty = line ? line.qty : 0;
  if(currentQty+1 > p.stock){ showToast('สต๊อกไม่พอ', true); return; }
  if(line) line.qty += 1; else state.cart.push({productId:pid, qty:1});
  render();
}
function changeQty(pid, delta){
  const line = state.cart.find(l=>l.productId===pid);
  if(!line) return;
  const p = getProduct(pid);
  const newQty = line.qty + delta;
  if(newQty <= 0){ state.cart = state.cart.filter(l=>l.productId!==pid); }
  else if(newQty > p.stock){ showToast('สต๊อกไม่พอ', true); return; }
  else { line.qty = newQty; }
  render();
}
function removeFromCart(pid){ state.cart = state.cart.filter(l=>l.productId!==pid); render(); }
function resetCartProof(){ state.cartProofBase64=null; state.cartProofMime=null; state.cartProofPreview=null; }
function clearCart(){ state.cart = []; state.cartMember=''; resetCartProof(); render(); }
function clearProofFile(){ resetCartProof(); render(); }

// ย่อขนาด + บีบอัดรูปก่อนอัปโหลด ป้องกันไฟล์ใหญ่เกินไป (สลิป QR ไม่จำเป็นต้องละเอียดมาก)
function resizeImageFile(file, maxSize, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('อ่านไฟล์รูปไม่สำเร็จ'));
    reader.onload = () => {
      img.onerror = () => reject(new Error('เปิดไฟล์รูปไม่สำเร็จ'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxSize){ h = Math.round(h*maxSize/w); w = maxSize; }
        else if(h > maxSize){ w = Math.round(w*maxSize/h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
async function handleProofFileChange(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await resizeImageFile(file, 1000, 0.6);
    state.cartProofPreview = dataUrl;
    state.cartProofMime = 'image/jpeg';
    state.cartProofBase64 = dataUrl.split(',')[1];
    render();
  }catch(e){ showToast(e.message, true); }
}

// อัปโหลดรูปสลิป — same-origin แล้วเลยรอผลลัพธ์ตรงๆ ได้เลย ไม่ต้องเลี่ยง CORS แบบเดิม
async function uploadSaleProofInBackground(saleId, imageBase64, mimeType){
  try{
    const res = await apiCall('attachSaleProof', {saleId, imageBase64, mimeType});
    const s = data.sales.find(x=>x.id===saleId); if(s) s.proofUrl = res.proofUrl;
    showToast('แนบรูปสลิปสำเร็จ');
    if(state.tab==='dashboard') render();
  }catch(e){ showToast('แนบรูปสลิปไม่สำเร็จ: ' + e.message, true); }
}

async function checkout(){
  if(state.cart.length===0) return;
  const items = state.cart.map(l=>({productId:l.productId, qty:l.qty}));
  const proofBase64 = state.cartProofBase64, proofMime = state.cartProofMime;
  try{
    const sale = await apiCall('checkout', {items, memberId: state.cartMember, payment: state.cartPayment});
    data.sales.push(sale);
    sale.items.forEach(it=>{ const p = getProduct(it.productId); if(p) p.stock -= it.qty; });
    state.cart = []; state.cartMember=''; state.cartPayment='Cash';
    resetCartProof();
    state.tab = 'sell'; render();
    showToast(`ขายสำเร็จ — ${money(sale.total)}`);
    if(proofBase64){ uploadSaleProofInBackground(sale.id, proofBase64, proofMime); }
  }catch(e){ showToast(e.message, true); }
}

async function saveProduct(id){
  const name = document.getElementById('f_name').value.trim();
  const category = document.getElementById('f_category').value;
  const sku = document.getElementById('f_sku').value.trim();
  const price = parseFloat(document.getElementById('f_price').value) || 0;
  const costEl = document.getElementById('f_cost');
  const stockEl = document.getElementById('f_stock');
  const lowStockThreshold = parseInt(document.getElementById('f_low').value) || 0;
  const unit = document.getElementById('f_unit').value.trim() || 'ชิ้น';
  if(!name){ showToast('กรุณากรอกชื่อสินค้า', true); return; }
  try{
    const body = {name, category, sku, price, lowStockThreshold, unit};
    // ซ่อนต้นทุนกับการแก้จำนวนสต๊อกตรงๆ จากพนักงาน — ถ้าไม่เห็นฟิลด์นี้ (ไม่ใช่เจ้าของร้าน) ไม่ส่งค่าไปทับของเดิม
    if(costEl) body.cost = parseFloat(costEl.value) || 0;
    if(stockEl && !stockEl.disabled) body.stock = parseInt(stockEl.value) || 0;
    else if(!id) body.stock = 0;
    let saved;
    if(id){ saved = await apiCall('updateProduct', {id, ...body}); const idx = data.products.findIndex(p=>p.id===id); if(idx>=0) data.products[idx]=saved; }
    else { saved = await apiCall('addProduct', body); data.products.push(saved); }
    closeModal(); state.tab='inventory'; render();
    showToast('บันทึกสินค้าเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}
async function deleteProduct(id){
  if(!confirm('ลบสินค้านี้? การลบไม่สามารถย้อนกลับได้')) return;
  try{
    await apiCall('deleteProduct', {id});
    data.products = data.products.filter(p=>p.id!==id);
    state.tab='inventory'; render();
    showToast('ลบสินค้าเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}

async function applyAdjust(id){

  try{

function setStockCountInput(productId, v){
  if(v===''){ delete state.stockCountInputs[productId]; }
  else{ state.stockCountInputs[productId] = v; }
}
async function submitStockCount(){
  const counts = Object.keys(state.stockCountInputs)
    .filter(pid => state.stockCountInputs[pid] !== '' && state.stockCountInputs[pid] != null)
    .map(pid => ({productId: pid, countedQty: parseInt(state.stockCountInputs[pid]) || 0}));
  if(counts.length===0){ showToast('กรุณากรอกจำนวนนับอย่างน้อย 1 รายการ', true); return; }
  if(!confirm(`ยืนยันบันทึกผลนับสต๊อก ${counts.length} รายการ?`)) return;
  try{
    const res = await apiCall('submitStockCount', {counts});
    res.results.forEach(r=>{ const p = getProduct(r.productId); if(p) p.stock = r.counted; });
    state.stockCountResults = res.results;
    state.stockCountInputs = {};
    render();
    showToast(res.totalDiffItems>0 ? `พบผลต่าง ${res.totalDiffItems} รายการ` : 'นับสต๊อกตรงกับระบบทุกรายการ');
  }catch(e){ showToast(e.message, true); }
}

async function confirmReceivePO(){
  const d = state.receiveDraft;
  const items = Object.keys(d.qty).map(productId => ({productId, receivedQty: d.qty[productId]}));
  try{
    const saved = await apiCall('receivePO', {id: d.poId, items});

    closeModal(); state.tab='po'; render();
    showToast(`${d.poId} รับของเรียบร้อย — สต๊อกอัปเดตแล้ว`);

  try{
    const saved = await apiCall('createPO', {supplier: d.supplier.trim(), items});
    data.purchaseOrders.push(saved);
    state.poDraft=null; closeModal(); state.tab='po'; render();
    showToast('สร้างใบสั่งซื้อเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}

async function saveMember(id){
  const name = document.getElementById('f_mname').value.trim();
  const phone = document.getElementById('f_mphone').value.trim();
  const email = document.getElementById('f_memail').value.trim();
  const notes = document.getElementById('f_mnotes').value.trim();
  if(!name){ showToast('กรุณากรอกชื่อสมาชิก', true); return; }
  try{
    const body = {name, phone, email, notes};
    let saved;
    if(id){ saved = await apiCall('updateMember', {id, ...body}); const idx = data.members.findIndex(m=>m.id===id); if(idx>=0) data.members[idx]=saved; }
    else { saved = await apiCall('addMember', body); data.members.push(saved); }
    closeModal(); state.tab='members'; render();
    showToast('บันทึกสมาชิกเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}
async function deleteMember(id){
  if(!confirm('ลบสมาชิกนี้? ประวัติการซื้อเดิมจะยังอยู่แต่จะแสดงเป็นลูกค้าทั่วไป')) return;
  try{
    await apiCall('deleteMember', {id});
    data.members = data.members.filter(m=>m.id!==id);
    data.sales.forEach(s=>{ if(s.memberId===id) s.memberId=''; });
    state.tab='members'; render();
    showToast('ลบสมาชิกเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}

function renderReportSales(){
  const dayStr = state.reportDate;

  const rows = daySales.map(s => ({sale:s, b:saleBreakdown(s)}));
  const sum = (fn) => rows.reduce((a,r)=>a+fn(r.b), 0);
  const totals = {
    gross: sum(b=>b.grossTotal), exVat: sum(b=>b.exVat), vat: sum(b=>b.vat),
    fee: sum(b=>b.feeExVat), profit: sum(b=>b.profit)

  return `
    <div class="card">

      </div>
      <div class="stat-grid" style="margin-bottom:16px;">

        <div class="stat-card"><div class="label">ค่าบริการ (Fee, ex VAT)</div><div class="value">${money(totals.fee)}</div></div>
        <div class="stat-card"><div class="label">กำไรจากสินค้า</div><div class="value">${money(totals.profit)}</div></div>
      </div>
      <div class="table-wrap">
      <table class="table">
        <thead><tr><th>เวลา</th><th>เลขที่</th><th>รายการสินค้า</th><th>สมาชิก</th><th>ผู้ขาย</th><th>รวม VAT</th><th>ex VAT</th><th>VAT ${vatPct}%</th><th>Fee (ex VAT)</th><th>กำไรสินค้า</th><th></th></tr></thead>
        <tbody>
          ${rows.length ? rows.map(({sale:s,b})=>`
            <tr>
              <td>${(fmtDateTime(s.date).split(', ')[1]) || fmtDateTime(s.date)}</td>
              <td>${escapeHtml(s.id)}</td>
              <td>${s.items.map(it=>escapeHtml(it.name)+' ×'+it.qty).join(', ')}</td>
              <td>${s.memberId ? escapeHtml(getMember(s.memberId)?.name || '—') : '<span class="muted">ลูกค้าทั่วไป</span>'}</td>
              <td class="muted">${escapeHtml(s.soldBy||'—')}</td>
              <td>${money(b.grossTotal)}</td>
              <td>${money(b.exVat)}</td>
              <td>${money(b.vat)}</td>
              <td>${b.feeExVat>0?money(b.feeExVat):'<span class="muted">—</span>'}</td>
              <td>${money(b.profit)}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteSale('${s.id}')">ลบ</button></td>
            </tr>`).join('') : '<tr><td colspan="11" class="empty-state">ไม่มีรายการขายในวันนี้</td></tr>'}
        </tbody>
        ${rows.length ? `<tfoot><tr>
          <td colspan="5" style="text-align:right;font-weight:700;padding:10px 12px;">รวมทั้งวัน</td>
          <td style="font-weight:700;padding:10px 12px;">${money(totals.gross)}</td>

          <td style="font-weight:700;padding:10px 12px;">${money(totals.profit)}</td>

async function deleteSale(id){
  if(!confirm(`ลบรายการขาย ${id}? สต๊อกสินค้าที่ขายไปจะถูกคืนกลับอัตโนมัติ การลบนี้ย้อนกลับไม่ได้`)) return;
  try{
    const sale = data.sales.find(s=>s.id===id);
    await apiCall('deleteSale', {id});
    if(sale){ sale.items.forEach(it=>{ const p = getProduct(it.productId); if(p) p.stock += it.qty; }); }
    data.sales = data.sales.filter(s=>s.id!==id);
    render();
    showToast('ลบรายการขายเรียบร้อย สต๊อกคืนกลับแล้ว');
  }catch(e){ showToast(e.message, true); }
}

function renderReportMovement(){
  const dayStr = state.reportDate;
  const isToday = dayStr === new Date().toLocaleDateString('en-CA');
  const daySales = data.sales.filter(s => localDateStr(s.date) === dayStr);
  const dayPOs = data.purchaseOrders.filter(po => po.receivedDate && localDateStr(po.receivedDate) === dayStr);
  const dayLogs = data.stockLog.filter(l => localDateStr(l.date) === dayStr);

  const rows = data.products.map(p=>{
    const sold = daySales.reduce((sum,s)=>sum + s.items.filter(it=>it.productId===p.id).reduce((a,it)=>a+it.qty,0), 0);
    const received = dayPOs.reduce((sum,po)=>sum + po.items.filter(it=>it.productId===p.id).reduce((a,it)=>a+(it.receivedQty!==undefined?it.receivedQty:it.qty), 0), 0);
    const adjust = dayLogs.filter(l=>l.productName===p.name).reduce((a,l)=>a+Number(l.delta),0);
    const closing = p.stock;
    const opening = closing - received + sold - adjust;
    return {product:p, opening, sold, received, adjust, closing};
  }).filter(r => r.sold || r.received || r.adjust);

  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
        <label style="margin:0;">เลือกวันที่</label>
        <input type="date" value="${dayStr}" onchange="setReportDate(this.value)">
      </div>
      ${!isToday ? '<div class="login-error" style="display:block;color:var(--warn);background:#fff2df;">หมายเหตุ: ยอดต้นวัน/ปลายวันของวันที่ไม่ใช่วันนี้ คำนวณย้อนหลังจากยอดปัจจุบัน อาจไม่แม่นยำ 100% แนะนำให้ดูรายงานนี้แบบวันต่อวันเป็นหลัก</div>' : ''}
      <div class="table-wrap">
      <table class="table">
        <thead><tr><th>สินค้า</th><th>ต้นวัน</th><th>ขาย</th><th>รับเข้า</th><th>ปรับ/นับ</th><th>ปลายวัน</th></tr></thead>
        <tbody>
          ${rows.length ? rows.map(r=>`
            <tr>
              <td>${escapeHtml(r.product.name)}</td>
              <td>${r.opening} ${escapeHtml(r.product.unit)}</td>
              <td>${r.sold>0?'-'+r.sold:'0'}</td>
              <td>${r.received>0?'+'+r.received:'0'}</td>
              <td>${r.adjust!==0 ? (r.adjust>0?'+':'')+r.adjust : '0'}</td>
              <td><strong>${r.closing} ${escapeHtml(r.product.unit)}</strong></td>
            </tr>`).join('') : '<tr><td colspan="6" class="empty-state">ไม่มีความเคลื่อนไหวในวันนี้</td></tr>'}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function renderReportValue(){
  const filtered = data.products.filter(p => state.reportValueCategory==='All' || p.category===state.reportValueCategory);
  const rows = filtered.map(p=>({product:p, value: p.stock*p.cost})).sort((a,b)=>b.value-a.value);

      <table class="table">
        <thead><tr><th>สินค้า</th><th>หมวดหมู่</th><th>คงเหลือ</th><th>ต้นทุน/หน่วย</th><th>มูลค่ารวม</th></tr></thead>

            <tr>
              <td>${escapeHtml(r.product.name)}</td>
              <td>${catLabel(r.product.category)}</td>
              <td>${r.product.stock} ${escapeHtml(r.product.unit)}</td>
              <td>${money(r.product.cost)}</td>
              <td>${money(r.value)}</td>

async function saveEmployee(id){
  const name = document.getElementById('f_ename').value.trim();
  const username = document.getElementById('f_euser').value.trim();
  const password = document.getElementById('f_epass').value;
  const role = document.getElementById('f_erole').value;
  if(!name){ showToast('กรุณากรอกชื่อ', true); return; }
  try{
    let saved;
    if(id){
      const activeEl = document.getElementById('f_eactive');
      const body = {id, name, role};
      if(activeEl) body.active = activeEl.value==='true';
      if(password) body.password = password;
      saved = await apiCall('updateEmployee', body);
      const idx = data.employees.findIndex(e=>e.id===id); if(idx>=0) data.employees[idx]=saved;
    } else {
      if(!username || !password){ showToast('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', true); return; }
      saved = await apiCall('addEmployee', {username, password, name, role});
      data.employees.push(saved);
    }
    closeModal(); state.tab='employees'; render();
    showToast('บันทึกข้อมูลพนักงานเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}
async function deleteEmployee(id){
  if(!confirm('ลบบัญชีพนักงานนี้? จะไม่สามารถล็อกอินได้อีก')) return;
  try{
    await apiCall('deleteEmployee', {id});
    data.employees = data.employees.filter(e=>e.id!==id);
    state.tab='employees'; render();
    showToast('ลบบัญชีพนักงานเรียบร้อย');
  }catch(e){ showToast(e.message, true); }
}
</script>
